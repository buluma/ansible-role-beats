---
- name: Download ElasticSearch apt key
  ansible.builtin.get_url:
    url: "{{ beats_client_elastic_gpg_key_url }}"
    dest: /tmp/elastic-beats.asc
    mode: "0644"

- name: Import ElasticSearch apt key
  ansible.builtin.command:
    cmd: gpg --dearmor -o /usr/share/keyrings/elastic-beats.gpg /tmp/elastic-beats.asc
    creates: /usr/share/keyrings/elastic-beats.gpg
  changed_when: false

- name: Install beats pre-req software
  ansible.builtin.apt:
    name: "{{ item }}"
  loop: "{{ beats_client_beats_prereq }}"

- name: Add Beats apt repository.
  ansible.builtin.apt_repository:
    repo: "{{ beats_client_elastic_repo_url }}"
    state: present

- name: Install beat packages.
  ansible.builtin.apt:
    name: "{{ item }}{% if beats_client_version %}={{ beats_client_version }}{% endif %}"
    state: present
  loop: "{{ beats_client_beats_packages }}"

- name: Copy beat configuration
  become: true
  ansible.builtin.copy:
    content: "{{ beats_clients_configs[item] | to_nice_yaml }}"
    dest: "/etc/{{ item }}/{{ item }}.yml"
    mode: "0644"
    owner: root
    group: root
  notify: "Restart {{ item }}"
  loop: "{{ beats_client_beats_packages }}"

- name: Enable beat service
  become: true
  ansible.builtin.service:
    name: "{{ item }}"
    state: started
    enabled: true
  loop: "{{ beats_client_beats_packages }}"
  failed_when: false

- name: Load default templates into elasticsearch
  ansible.builtin.command: |
    {{ item }} setup --template -E output.logstash.enabled=false -E 'output.elasticsearch.hosts=["localhost:9200"]'
  loop: "{{ beats_client_beats_packages }}"
  when: beats_client_inject_templates
  changed_when: false
